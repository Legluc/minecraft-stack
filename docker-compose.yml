services:
  minecraft:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "2G"
    ports:
      - "25566:25565"
    volumes:
      - minecraft-data:/data
    networks:
      - internal
    restart: unless-stopped

volumes:
  minecraft-data:

networks:
  internal:
